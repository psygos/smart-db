services:
  gateway:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.gateway
      args:
        VITE_API_BASE_URL: ""
    depends_on:
      middleware:
        condition: service_healthy
      partdb:
        condition: service_healthy
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./state/caddy/data:/data
      - ./state/caddy/config:/config
      - ./state/caddy/certs/server.crt:/certs/server.crt:ro
      - ./state/caddy/certs/server.key:/certs/server.key:ro

  middleware:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.middleware
    env_file:
      - ./config/middleware.env
    environment:
      NODE_EXTRA_CA_CERTS: /workspace/certs/smart-db-root-ca.crt
    networks:
      - smartdb
    ports:
      - "127.0.0.1:4000:4000"
    restart: unless-stopped
    volumes:
      - ./state/smartdb/data:/workspace/data
      - ./state/caddy/certs/smart-db-root-ca.crt:/workspace/certs/smart-db-root-ca.crt:ro

  partdb:
    image: jbtronics/part-db1@sha256:5b1729ff1a024149ac27dc8f988e51c19a1140dbebbb2d0ae4854f8e771293f6
    env_file:
      - ./config/partdb.env
    networks:
      - smartdb
    ports:
      - "127.0.0.1:8080:80"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "php",
          "-r",
          "exit(@file_get_contents('http://127.0.0.1/en/login', false, stream_context_create(['http' => ['ignore_errors' => true, 'timeout' => 5]])) === false ? 1 : 0);",
        ]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 10
    volumes:
      - ./state/partdb/uploads:/var/www/html/uploads
      - ./state/partdb/public-media:/var/www/html/public/media
      - ./state/partdb/db:/var/www/html/var/db

networks:
  smartdb:
    driver: bridge
