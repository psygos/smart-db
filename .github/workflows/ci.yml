name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Typecheck & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

  deploy:
    name: Deploy to server
    needs: check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        run: |
          mkdir -p /opt/smart-db
          cd /opt/smart-db
          if [ ! -d .git ]; then
            git init -q
          fi
          if ! git remote get-url origin >/dev/null 2>&1; then
            git remote add origin https://github.com/Makerspace-Ashoka/smart-db.git
          else
            git remote set-url origin https://github.com/Makerspace-Ashoka/smart-db.git
          fi
          git fetch origin main
          git reset --hard origin/main

      - name: Install dependencies
        run: |
          cd /opt/smart-db
          docker run --rm -v "$(pwd)":/workspace -w /workspace node:24-bookworm-slim \
            bash -c "corepack enable && pnpm install --frozen-lockfile"

      - name: Build and restart containers
        run: |
          cd /opt/smart-db/deploy
          for env_file in config/middleware.env config/partdb.env; do
            if [ ! -f "$env_file" ]; then
              echo "Missing $env_file — aborting before container rebuild."
              exit 1
            fi
          done
          docker compose build --no-cache middleware gateway
          docker compose up -d --force-recreate --no-deps middleware gateway || {
            echo "Initial compose up failed. Dumping compose config + retrying once..."
            docker compose config >/dev/null || exit 1
            sleep 2
            docker compose up -d --force-recreate --no-deps middleware gateway
          }

      - name: Wait for health check
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4000/health > /dev/null 2>&1; then
              echo "Middleware healthy after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Health check failed after 30s"
          cd /opt/smart-db/deploy && docker compose logs middleware --tail 20
          exit 1

      - name: Verify frontend
        run: |
          sleep 5
          curl -skf https://10.42.200.4/health || curl -skf https://localhost/health || (echo "Gateway unreachable" && exit 1)
