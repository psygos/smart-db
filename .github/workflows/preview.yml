name: PR Preview

on:
  pull_request:
    branches: [dev]
    types: [opened, synchronize, reopened, closed]

permissions:
  pull-requests: write

env:
  NODE_VERSION: "24"
  CADDY_HOST: "192.168.7.3"
  ROUTER_PORT: "9444"

jobs:
  check:
    if: github.event.action != 'closed'
    uses: ./.github/workflows/_check.yml

  deploy:
    name: Deploy preview
    if: github.event.action != 'closed'
    needs: check
    runs-on: [self-hosted, smartdb-staging-lxc]

    env:
      PR_N: ${{ github.event.pull_request.number }}

    steps:
      - uses: actions/checkout@v4

      - name: Tear down any existing preview (wipe data for fresh state)
        run: |
          COMPOSE_PROJECT_NAME=smartdb-pr-${{ env.PR_N }} \
            docker compose \
              -f /opt/smart-db/builds/preview-${{ env.PR_N }}/deploy/compose.pr-preview.yaml \
              down --volumes --remove-orphans 2>/dev/null || true
          rm -rf \
            /opt/smart-db/state/preview-${{ env.PR_N }} \
            /opt/smart-db/config/preview-${{ env.PR_N }}

      - name: Sync workspace to preview build dir
        run: |
          rsync -a --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            "$GITHUB_WORKSPACE/" /opt/smart-db/builds/preview-${{ env.PR_N }}/

      - name: Write preview config
        run: |
          mkdir -p /opt/smart-db/config/preview-${{ env.PR_N }}
          SESSION_COOKIE_SECRET=$(openssl rand -base64 48)
          printf '%s\n' \
            "PORT=4000" \
            "FRONTEND_ORIGIN=https://${{ env.CADDY_HOST }}:${{ env.ROUTER_PORT }}" \
            "PUBLIC_BASE_URL=https://${{ env.CADDY_HOST }}:${{ env.ROUTER_PORT }}/pr/${{ env.PR_N }}" \
            "SMART_DB_DATA_PATH=/workspace/data/smart.db" \
            "PARTDB_BASE_URL=" \
            "PARTDB_API_TOKEN=" \
            "SESSION_COOKIE_SECRET=${SESSION_COOKIE_SECRET}" \
            "ZITADEL_ISSUER=${{ secrets.ZITADEL_ISSUER }}" \
            "ZITADEL_CLIENT_ID=${{ secrets.ZITADEL_CLIENT_ID }}" \
            "ZITADEL_CLIENT_SECRET=${{ secrets.ZITADEL_CLIENT_SECRET }}" \
            "ZITADEL_ROLE_CLAIM=${{ secrets.ZITADEL_ROLE_CLAIM }}" \
            "ZITADEL_POST_LOGOUT_REDIRECT_URI=https://${{ env.CADDY_HOST }}:${{ env.ROUTER_PORT }}" \
            > /opt/smart-db/config/preview-${{ env.PR_N }}/middleware.env

      - name: Ensure state directory exists
        run: mkdir -p /opt/smart-db/state/preview-${{ env.PR_N }}/data

      - name: Copy staging TLS certs into preview state
        run: |
          mkdir -p /opt/smart-db/state/preview-${{ env.PR_N }}/caddy/certs
          cp /opt/smart-db/state/staging/caddy/certs/server.crt \
             /opt/smart-db/state/preview-${{ env.PR_N }}/caddy/certs/
          cp /opt/smart-db/state/staging/caddy/certs/server.key \
             /opt/smart-db/state/preview-${{ env.PR_N }}/caddy/certs/

      - name: Build containers
        working-directory: /opt/smart-db/builds/preview-${{ env.PR_N }}/deploy
        run: |
          COMPOSE_PROJECT_NAME=smartdb-pr-${{ env.PR_N }} \
          VITE_BASE_PATH=/pr/${{ env.PR_N }}/ \
          VITE_API_BASE_URL=https://${{ env.CADDY_HOST }}:${{ env.ROUTER_PORT }}/pr/${{ env.PR_N }} \
          SMART_DB_STATE=/opt/smart-db/state/preview-${{ env.PR_N }} \
          SMART_DB_CONFIG=/opt/smart-db/config/preview-${{ env.PR_N }} \
            docker compose -f compose.pr-preview.yaml build --no-cache middleware gateway

      - name: Start containers
        working-directory: /opt/smart-db/builds/preview-${{ env.PR_N }}/deploy
        run: |
          COMPOSE_PROJECT_NAME=smartdb-pr-${{ env.PR_N }} \
          VITE_BASE_PATH=/pr/${{ env.PR_N }}/ \
          VITE_API_BASE_URL=https://${{ env.CADDY_HOST }}:${{ env.ROUTER_PORT }}/pr/${{ env.PR_N }} \
          SMART_DB_STATE=/opt/smart-db/state/preview-${{ env.PR_N }} \
          SMART_DB_CONFIG=/opt/smart-db/config/preview-${{ env.PR_N }} \
            docker compose -f compose.pr-preview.yaml up -d

      - name: Health check
        run: |
          for i in $(seq 1 30); do
            if curl -skf "https://${{ env.CADDY_HOST }}:${{ env.ROUTER_PORT }}/pr/${{ env.PR_N }}/health" > /dev/null 2>&1; then
              echo "Healthy after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Health check failed after 30s"
          COMPOSE_PROJECT_NAME=smartdb-pr-${{ env.PR_N }} \
            docker compose \
              -f /opt/smart-db/builds/preview-${{ env.PR_N }}/deploy/compose.pr-preview.yaml \
              logs middleware --tail 30
          exit 1

      - name: Seed catalog
        run: |
          docker exec \
            $(docker compose -p smartdb-pr-${{ env.PR_N }} ps -q middleware) \
            sh -c 'cd /workspace && pnpm --filter @smart-db/middleware exec tsx src/scripts/seed-catalog.ts'

      - name: Post PR comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PREVIEW_URL="https://${{ env.CADDY_HOST }}:${{ env.ROUTER_PORT }}/pr/${{ env.PR_N }}"
          COMMIT="${{ github.event.pull_request.head.sha }}"
          BODY=$(printf '### Preview deployed\n**URL:** %s\n**Commit:** `%s`\n\n> Data resets on every push. Torn down when this PR closes.' \
            "$PREVIEW_URL" "${COMMIT:0:7}")

          BODY_JSON=$(python3 -c "import json,sys; print(json.dumps(sys.stdin.read()))" <<< "$BODY")

          EXISTING=$(curl -sf \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${{ env.PR_N }}/comments?per_page=100" \
            | python3 -c "import json,sys;cs=[c for c in json.load(sys.stdin) if '### Preview' in c.get('body','')];print(cs[-1]['id'] if cs else '')" \
            2>/dev/null || true)

          if [ -n "$EXISTING" ]; then
            curl -sf -X PATCH \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/json" \
              "https://api.github.com/repos/${{ github.repository }}/issues/comments/$EXISTING" \
              -d "{\"body\":$BODY_JSON}" > /dev/null
          else
            curl -sf -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/json" \
              "https://api.github.com/repos/${{ github.repository }}/issues/${{ env.PR_N }}/comments" \
              -d "{\"body\":$BODY_JSON}" > /dev/null
          fi

  teardown:
    name: Tear down preview
    if: github.event.action == 'closed'
    runs-on: [self-hosted, smartdb-staging-lxc]

    env:
      PR_N: ${{ github.event.pull_request.number }}

    steps:
      - name: Stop and remove containers
        run: |
          COMPOSE_PROJECT_NAME=smartdb-pr-${{ env.PR_N }} \
            docker compose \
              -f /opt/smart-db/builds/preview-${{ env.PR_N }}/deploy/compose.pr-preview.yaml \
              down --volumes --remove-orphans 2>/dev/null || true

      - name: Remove build and state directories
        run: |
          rm -rf \
            /opt/smart-db/builds/preview-${{ env.PR_N }} \
            /opt/smart-db/state/preview-${{ env.PR_N }} \
            /opt/smart-db/config/preview-${{ env.PR_N }}

      - name: Update PR comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BODY=$(printf '### Preview torn down\nPR #%s closed — preview environment removed.' "${{ env.PR_N }}")

          BODY_JSON=$(python3 -c "import json,sys; print(json.dumps(sys.stdin.read()))" <<< "$BODY")

          EXISTING=$(curl -sf \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${{ env.PR_N }}/comments?per_page=100" \
            | python3 -c "import json,sys;cs=[c for c in json.load(sys.stdin) if '### Preview' in c.get('body','')];print(cs[-1]['id'] if cs else '')" \
            2>/dev/null || true)

          if [ -n "$EXISTING" ]; then
            curl -sf -X PATCH \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/json" \
              "https://api.github.com/repos/${{ github.repository }}/issues/comments/$EXISTING" \
              -d "{\"body\":$BODY_JSON}" > /dev/null || true
          fi
