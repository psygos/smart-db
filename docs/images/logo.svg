<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" fill="none">
  <!-- The gear-S: a stylized S made from circuit/gear language -->
  <g transform="translate(16, 10)">
    <!-- outer gear teeth (top) -->
    <rect x="22" y="0" width="8" height="5" fill="#1d4ed8"/>
    <rect x="42" y="0" width="8" height="5" fill="#1d4ed8"/>
    <rect x="62" y="0" width="8" height="5" fill="#1d4ed8"/>
    
    <!-- top bar of S -->
    <rect x="18" y="5" width="56" height="6" rx="1" fill="#1d4ed8"/>
    
    <!-- left descender -->
    <rect x="18" y="5" width="6" height="28" rx="1" fill="#1d4ed8"/>
    
    <!-- middle bar -->
    <rect x="18" y="47" width="56" height="6" rx="1" fill="#ea580c"/>
    
    <!-- right descender from middle -->
    <rect x="68" y="47" width="6" height="28" rx="1" fill="#1d4ed8"/>
    
    <!-- bottom bar of S -->
    <rect x="18" y="89" width="56" height="6" rx="1" fill="#1d4ed8"/>
    
    <!-- outer gear teeth (bottom) -->
    <rect x="22" y="95" width="8" height="5" fill="#1d4ed8"/>
    <rect x="42" y="95" width="8" height="5" fill="#1d4ed8"/>
    <rect x="62" y="95" width="8" height="5" fill="#1d4ed8"/>
    
    <!-- gear teeth (left side) -->
    <rect x="12" y="14" width="6" height="6" fill="#1d4ed8"/>
    <rect x="12" y="26" width="6" height="6" fill="#1d4ed8"/>
    
    <!-- gear teeth (right side) -->
    <rect x="74" y="62" width="6" height="6" fill="#1d4ed8"/>
    <rect x="74" y="74" width="6" height="6" fill="#1d4ed8"/>
    
    <!-- circuit dot: top-right corner -->
    <circle cx="74" cy="8" r="4" fill="#1d4ed8"/>
    
    <!-- circuit dot: bottom-left corner -->
    <circle cx="18" cy="92" r="4" fill="#1d4ed8"/>
    
    <!-- pin connectors (left of top bar) -->
    <line x1="0" y1="8" x2="14" y2="8" stroke="#1d4ed8" stroke-width="2"/>
    <circle cx="0" cy="8" r="2.5" fill="none" stroke="#1d4ed8" stroke-width="1.5"/>
    
    <!-- pin connector (right of bottom bar) -->
    <line x1="80" y1="92" x2="94" y2="92" stroke="#1d4ed8" stroke-width="2"/>
    <circle cx="94" cy="92" r="2.5" fill="none" stroke="#1d4ed8" stroke-width="1.5"/>
  </g>
  
  <!-- Text: "mart DB" in Plex Mono style -->
  <text x="128" y="72" font-family="'IBM Plex Mono', monospace" font-size="52" font-weight="600" fill="#18181b" letter-spacing="-1">
    mart
  </text>
  <text x="340" y="72" font-family="'IBM Plex Mono', monospace" font-size="52" font-weight="600" fill="#18181b" letter-spacing="-1">
    DB
  </text>
  
  <!-- Thin separator line between "mart" and "DB" -->
  <rect x="334" y="34" width="1.5" height="46" fill="#e5e7eb"/>
  
  <!-- Subtle tagline -->
  <text x="128" y="100" font-family="'IBM Plex Mono', monospace" font-size="11" font-weight="400" fill="#a1a1aa" letter-spacing="3">
    INVENTORY · INTAKE · TRACK
  </text>
</svg>
